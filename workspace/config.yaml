# 默认模型：MiniMax Coding Plan（国内端点，Anthropic 兼容）
# - key 从环境变量 MINIMAX_API_KEY 读取（不写入此文件，随源码走的只有结构）
# - base_url 走国内端点 api.minimaxi.com（阿里云直连，不经代理）
model:
  provider: minimax
  default: MiniMax-M2.7-highspeed
  base_url: https://api.minimaxi.com/anthropic

platforms:
  api_server:
    port: 8642
    enabled: true
mcp_servers: {}
